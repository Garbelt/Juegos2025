
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompecabezas</title>
    <link rel="stylesheet" href="mensajes.css">
    <link rel="stylesheet" href="botoneria.css">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="adaptadores.css">
    <link rel="stylesheet" href="pre-game.css">
    <style>
        #puzzle {
            display: flex;
            flex-wrap: wrap;
            width: 408px; /* Ajustar según el tamañodela imagen*/
            height: 408px; /* Ajustar según el tamañodela imagen*/
            margin: 0 auto;
        }

        .piece {
            width: 136px; /* Ajustar según el tamañodela imageny el número de piezas */
            height: 136px; /* Ajustar según el tamañodela imageny el número de piezas */
            background-size: 408px 408px; /* Ajustarsegún el tamaño de la imagen */
            cursor: pointer;
            box-sizing: border-box;
            border: 1px solid #333;
        }

        .piece.selected {
            box-shadow: 0 0 10px 5px rgba(0, 0, 255, 0.5);
            transform: scale(1.1);
            z-index: 1;
        }

        .empty {
            background: none;
            border: none;
        }

/* =========================================
   MODAL
   ========================================= */
.modal {
    display: none;
}

.modal-content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #8ec6e6;
    color: black;
    padding: 20px;
    border: 2px solid #333;
    border-radius: 10px;
    font-size: 24px;
    z-index: 9999;
    text-align: center;
    width: 80%;
    max-width: 300px;
}

/* ================= MOBILE BASE ================= */
@media screen and (max-width:1023px){
    .piece{
        width: 33.333333%;
        height: 33.333333%;
        background-size: 300% 300%;
        background-repeat:no-repeat;
        background-position:center;
    }
}

/* ================= PORTRAIT ================= */
@media screen and (max-width:1023px) and (orientation:portrait){
/* 🔹 panel full + título visible */
body.panel-full:not(.header-hidden) #puzzle{
        height:360px;
    	width:360px;
        max-height:364px;
    	max-width:364px;
        min-height:356px;
    	min-width:356px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 panel full + título oculto */
body.panel-full.header-hidden #puzzle{
        height:364px;
    	width:364px;
        max-height:368px;
    	max-width:368px;
        min-height:360px;
    	min-width:360px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 panel mini + título visible */
body.panel-mini:not(.header-hidden) #puzzle{
        height:364px;
    	width:364px;
        max-height:368px;
    	max-width:368px;
        min-height:360px;
    	min-width:360px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 panel mini + título oculto */
body.panel-mini.header-hidden #puzzle{
        height:368px;
    	width:368px;
        max-height:372px;
    	max-width:372px;
        min-height:364px;
    	min-width:364px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 panel oculto + título visible */
body.panel-hidden:not(.header-hidden) #puzzle{
        height:372px;
    	width:372px;
        max-height:376px;
    	max-width:376px;
        min-height:368px;
    	min-width:368px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 panel oculto + título oculto */
body.panel-hidden.header-hidden #puzzle{
        height:380px;
    	width:380px;
        max-height:384px;
    	max-width:384px;
        min-height:376px;
    	min-width:376px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}
}

/* ================= LANDSCAPE ================= */
@media screen and (max-width:1023px) and (orientation:landscape){
/* 🔒 regla principal */
body:not(.header-hidden) #puzzle{
        height:308px;
    	width:308px;
        max-height:312px;
    	max-width:312px;
        min-height:304px;
    	min-width:304px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 título oculto + panel full */
body.panel-full.header-hidden #puzzle{
        height:324px;
    	width:324px;
        max-height:328px;
    	max-width:328px;
        min-height:320px;
    	min-width:320px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 título oculto + panel mini */
body.panel-mini.header-hidden #puzzle{
        height:348px;
    	width:348px;
        max-height:356px;
    	max-width:356px;
        min-height:340px;
    	min-width:340px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}

/* 🔹 título oculto + panel oculto */
body.panel-hidden.header-hidden #puzzle{
        height:372px;
    	width:372px;
        max-height:376px;
    	max-width:376px;
        min-height:368px;
    	min-width:368px;
        aspect-ratio: 1 / 1; /* siempre cuadrado */
}
}
</style>
</head>
<body>

</div>

</td>

</table>

</div>

<script>
// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
