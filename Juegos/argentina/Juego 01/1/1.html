#puzzle{

    width:100%;
}

        align-items:center;

   ========================================= */

    background:rgba(0,0,0,0.45);

    max-width:90%;

#titulo-instruccion{
    opacity:0.8;
    margin-right:6px;
}

#indicacion{
    font-weight:900;
}

#zona-indicacion.indicacion-oculta{
    opacity: 0;
    pointer-events: none;
}


/* =========================================
   MODAL
   ========================================= */

.modal {
    display: none;
}

.modal-content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #8ec6e6;
    color: black;
    padding: 20px;
    border: 2px solid #333;
    border-radius: 10px;

<script>
window.addEventListener("load", () => { 
    // Mostrar usuario si existe en localStorage
    const actualUsername = localStorage.getItem("ActualUs");
    if (actualUsername) {
        const userHorizontal = document.getElementById("actualUsername");
        const userVertical = document.getElementById("actualUsername-vertical");
        if(userHorizontal) userHorizontal.textContent = actualUsername;
        if(userVertical) userVertical.textContent = actualUsername;
    }
});

// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
