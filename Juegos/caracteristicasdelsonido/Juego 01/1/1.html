
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sopa de Letras</title>
<link rel="stylesheet" href="mensajesdiferente2.css">
<link rel="stylesheet" href="botoneria.css">
<link rel="stylesheet" href="estilos.css">
<link rel="stylesheet" href="adaptadores.css">
<link rel="stylesheet" href="pre-game.css">
<style>

/* =========================================
   CONTENEDOR VERTICAL DEL JUEGO
   ========================================= */

#contenedor-juego{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
min-height:100%;
width:100%;
}


/* =========================================
   ZONA DEL PUZZLE
   (centra la grilla verticalmente)
   ========================================= */

#zona-puzzle{
flex:1;
display:flex;
align-items:center;
justify-content:center;
width:100%;
}


/* =========================================
   REFERENCIA
   (siempre abajo del área del juego)
   ========================================= */

.titulo-referencias{
background:rgba(0,0,0,0.45);
color:white;
padding:6px 12px;
border-radius:6px;
font-size:clamp(16px,2.2vw,24px);
font-weight:bold;
display:flex;
align-items:baseline;   /* CLAVE */
justify-content:center;
gap:8px;
white-space:nowrap;
width:fit-content;
min-width:60%;
max-width:90%;
line-height:1;          /* CLAVE */
}

/* =========================================
   LISTA DE PALABRAS (compatibilidad)
   ========================================= */

#lista-palabras{
font-size:inherit;
line-height:1;
display:flex;
align-items:baseline;   /* CLAVE */
justify-content:center;
margin:0;
padding:0;
}

#lista-palabras ul{
list-style-type:none;
padding:0;
margin:0;
display:flex;
align-items:center;
}

#lista-palabras ul li{
margin:0;
padding:0;
font-weight:900;
line-height:1;          /* CLAVE */
display:inline-block;
}


/* =========================================
   GRILLA BASE
   ========================================= */

.cell{
width:clamp(22px,6vw,30px);
height:clamp(22px,6vw,30px);
border:1px solid #ccc;
display:inline-block;
text-align:center;
line-height:clamp(22px,6vw,30px);
font-size:clamp(12px,3vw,16px);
box-sizing:border-box;
}

#puzzle{
display:inline-block;
max-width:100%;
}

.row{
display:flex;
}

.found{
background-color:yellow;
}


/* =========================================
   MODAL
   ========================================= */

.modal{
display:none;
}

.modal-content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background-color:#8ec6e6;
color:black;
padding:20px;
border:2px solid #333;
border-radius:10px;
font-size:24px;
z-index:9999;
text-align:center;
width:80%;
max-width:300px;
}


/* =========================================
   TD DEL JUEGO
   (permite el centrado vertical)
   ========================================= */

#align-center-center{
height:100%;
vertical-align:top;
}


/* =========================================
   PUZZLE FLEX SOLO EN MOVIL
   ========================================= */

@media screen and (max-width:1023px){

#puzzle{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
width:100%;
max-width:100%;
box-sizing:border-box;
}

}


/* =========================================
   MOVIL HORIZONTAL
   ========================================= */

@media screen and (max-width:1023px) and (orientation:landscape){

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

#puzzle{
flex:0;
margin-top:4px;
}

/* Tamaño base */

body:not(.header-hidden) .cell{
width:clamp(18px,4.8vh,28px);
height:clamp(18px,4.8vh,28px);
line-height:clamp(18px,4.8vh,28px);
font-size:clamp(11px,2.4vh,15px);
}

/* Panel full */

body.panel-full.header-hidden .cell{
width:clamp(18px,5.2vh,30px);
height:clamp(18px,5.2vh,30px);
line-height:clamp(18px,5.2vh,30px);
font-size:clamp(11px,2.6vh,16px);
}

/* Panel mini */

body.panel-mini.header-hidden .cell{
width:clamp(18px,5.5vh,32px);
height:clamp(18px,5.5vh,32px);
line-height:clamp(18px,5.5vh,32px);
font-size:clamp(11px,2.8vh,17px);
}

/* Panel oculto */

body.panel-hidden.header-hidden .cell{
width:clamp(18px,6vh,34px);
height:clamp(18px,6vh,34px);
line-height:clamp(18px,6vh,34px);
font-size:clamp(12px,3vh,18px);
}

}


/* =========================================
   MOVIL VERTICAL
   ========================================= */

@media screen and (max-width:1023px) and (orientation:portrait){

body.panel-full:not(.header-hidden) .cell{
width:clamp(20px,6vw,32px);
height:clamp(20px,6vw,32px);
line-height:clamp(20px,6vw,32px);
font-size:clamp(12px,3vw,17px);
}

body.panel-full.header-hidden .cell{
width:clamp(20px,6.5vw,34px);
height:clamp(20px,6.5vw,34px);
line-height:clamp(20px,6.5vw,34px);
font-size:clamp(12px,3.2vw,18px);
}

body.panel-mini .cell{
width:clamp(20px,7vw,36px);
height:clamp(20px,7vw,36px);
line-height:clamp(20px,7vw,36px);
font-size:clamp(12px,3.4vw,19px);
}

body.panel-hidden .cell{
width:clamp(20px,7.5vw,38px);
height:clamp(20px,7.5vw,38px);
line-height:clamp(20px,7.5vw,38px);
font-size:clamp(13px,3.6vw,20px);
}

}

/* =========================================
   ESCRITORIO
   (usa el layout original centrado)
   ========================================= */

@media screen and (min-width:1024px){

body{
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
display:none;
width:100%;
max-width:900px;
margin:0 auto;
border:2px solid #333;
align-items:center;
}

table{
border-collapse:collapse;
width:100%;
aspect-ratio:7 / 4;
}

#align-center-center{
text-align:center;
vertical-align:middle;
}

/* En escritorio NO usamos flex vertical interno */

#contenedor-juego{
display:block;
height:auto;
}

#zona-puzzle{
display:block;
}

.titulo-referencias{
display:inline-flex;   /* importante en tablas */
align-items:center;    /* no baseline */
justify-content:center;
line-height:1;
margin-left:auto;
margin-right:auto;
}

#lista-palabras{
display:inline-flex;
align-items:center;
line-height:1;
}

#lista-palabras ul{
display:inline-flex;
align-items:center;
margin:0;
padding:0;
}

#lista-palabras ul li{
display:inline-flex;
align-items:center;
line-height:1;
margin:0;
padding:0;
}
}
	
</style>
</head>
<body>

<!-- ================= CONTENIDO DEL JUEGO ================= -->

    		    <span class="titulo-principal">SOPA DE LETRAS</span><br>
      		  <span class="titulo-secundario">Características del Sonido</span>
  		  </th>
        </tr>

        <tr>
<td id="align-center-center">

<div id="contenedor-juego">

    <div id="zona-puzzle">
        <div id="puzzle"></div>
    </div>

    <div class="titulo-referencias">
        PALABRA A ENCONTRAR
        <div id="lista-palabras">
            <ul>
                <li id="palabras"></li>
            </ul>
        </div>
    </div>

</div>

</td>

            <td id="align-left-top" class="celda-panel" style="position: relative;">
			<div id="panel">
			    <div>

			        <div class="dato">
			            <span class="icono">👤</span>
			            <span id="actualUsername"></span>

                            </div>

                <button id="lectorButton">Cancelar Lectura</button>
            </td>

		<tr class="fila-panel-vertical">
		    <th colspan="2" class="celda-panel-vertical" style="position: relative;">
			<div id="panel-vertical">

 			   <div class="dato">
 			       <span class="icono">👤</span>
  			      <span id="actualUsername-vertical"></span>
			    </div>

			    <div class="dato">
			        <span class="icono">⭐</span>
			        <span class="texto">Puntaje:</span>
   			     <span id="puntaje-vertical">0</span>
			    </div>

			    <div class="dato">
			        <span class="icono">⏱</span>
			        <span class="texto">Tiempo:</span>
			        <span id="reloj-vertical">02:00</span>
			    </div>
				
			</div>
            </th>
        </tr>

    </table>
</div>

<audio id="background-music" loop>

<script>
window.addEventListener("load", () => {
    const actualUsername = localStorage.getItem("ActualUs");
    if (actualUsername) {
        document.getElementById("actualUsername").textContent = actualUsername;
		document.getElementById("actualUsername-vertical").textContent = actualUsername;
    }
});
	
// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
