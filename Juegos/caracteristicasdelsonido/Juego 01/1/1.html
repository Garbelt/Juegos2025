
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sopa de Letras</title>
<link rel="stylesheet" href="mensajesdiferente2.css">
<link rel="stylesheet" href="botoneria.css">
<link rel="stylesheet" href="estilos.css">
<link rel="stylesheet" href="adaptadores.css">
<link rel="stylesheet" href="pre-game.css">
<style>
    #lista-palabras {
        font-size: clamp(10px, 1.5vw, 14px);
        line-height: 1.3;
        max-height: 200px;
        overflow-y: auto;
        text-align: center;
    }

    #lista-palabras ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    #lista-palabras ul li {
        margin-bottom: 5px;
    }

    .titulo-referencias {
        font-size: clamp(14px, 2vw, 18px);
        font-weight: bold;
        margin-top: 15px;
        margin-bottom: 5px;
        white-space: nowrap;
        text-align: center;
    }

 .cell {
     width: clamp(22px, 6vw, 30px);
     height: clamp(22px, 6vw, 30px);
     border: 1px solid #ccc;
     display: inline-block;
     text-align: center;
     line-height: clamp(22px, 6vw, 30px);
     font-size: clamp(12px, 3vw, 16px);
     box-sizing: border-box;
 }

 #puzzle {
    display: inline-block;
    max-width: 100%;
 }

  .row {
    display: flex;
}  

    .found {
        background-color: yellow;
    }

	   .modal {
       display: none;
   }
   .modal-content {
       position: fixed;
       top: 50%;
       left: 50%;
       transform: translate(-50%, -50%);
       background-color: #8ec6e6;
       color: black;
       padding: 20px;
       border: 2px solid #333;
       border-radius: 10px;
       font-size: 24px;
       z-index: 9999;
       text-align: center;
       width: 80%;
       max-width: 300px;
   }

/* =========================================
   PUZZLE - MODO FLEX SOLO EN MOVIL
   ========================================= */
@media screen and (max-width:1023px){
    #puzzle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
    }
}

/* =========================================
   MOVIL HORIZONTAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:landscape){
/* =============================
   REFERENCIA EN LINEA
   ============================= */
    .titulo-referencias {
        font-size: clamp(16px, 2.5vw, 20px);
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        white-space: normal;
        margin-top: 8px;
    }
    #lista-palabras {
        font-size: inherit;
        line-height: inherit;
        max-height: none;
        overflow: visible;
    }
    #lista-palabras ul {
        display: flex;
        flex-direction: row;
        padding: 0;
        margin: 0;
    }
    #lista-palabras li {
        font-size: inherit;
        font-weight: 900;
        margin: 0;
    }

/* =============================
   CONTROL DE ALTURA DE GRILLA
   ============================= */
    #puzzle {
        max-height: 58vh;
        max-height: 58dvh;
        overflow: hidden;
    }

/* =============================
   ESTADOS DEL PANEL
   ============================= */
/* titulo visible */
    body:not(.header-hidden) #puzzle {
        max-height: 58vh;
    }
/* titulo oculto + panel full */
    body.panel-full.header-hidden #puzzle {
        max-height: 72vh;
    }
/* titulo oculto + panel mini */
    body.panel-mini.header-hidden #puzzle {
        max-height: 76vh;
    }
/* titulo oculto + panel oculto */
    body.panel-hidden.header-hidden #puzzle {
        max-height: 82vh;
    }
}


/* =========================================
   MOVIL VERTICAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:portrait){
/* panel full + titulo visible */
    body.panel-full:not(.header-hidden) #puzzle {
        max-height: 80vh;
        max-height: 80dvh;
    }
/* titulo oculto */
    body.panel-full.header-hidden #puzzle {
        max-width: 87vw;
    }
/* panel mini */
    body.panel-mini:not(.header-hidden) #puzzle {
        max-width: 88vw;
    }
    body.panel-mini.header-hidden #puzzle {
        max-width: 90vw;
    }
/* panel oculto */
    body.panel-hidden:not(.header-hidden) #puzzle {
        max-width: 92vw;
    }
    body.panel-hidden.header-hidden #puzzle {
        max-width: 95vw;
    }
}

</style>
</head>
<body>

<!-- ================= PANTALLA PREVIA ================= -->
<div id="pre-game-screen" style="display: none;">
    <div id="pre-game-container">
        <h1 id="game-title" class="pre-game-title">Clasificación de Instrumentos</h1>
        <p id="game-description" class="pre-game-description">
            Aprende a clasificar los instrumentos según su tipo. Selecciona correctamente para ganar puntos.
        </p>

        <div id="pre-game-buttons">
            <button id="ver-video-btn">Ver Video Explicativo</button>
            <button id="read-screen">Leer Descripción</button>
        </div>

        <button id="continuar-btn" class="btn-continue">Continuar</button>
    </div>

    <!-- Modal de video -->
	<div id="video-modal" class="modal">
 	   <div class="modal-content">
    	    <span id="close-video" style="cursor:pointer;">Cerrar X</span>

   	     <video id="pre-game-video" width="100%" controls>
    	        <source src="videos/explicacion.mp4" type="video/mp4">
    	        Tu navegador no soporta el video.
  	      </video>

 	   </div>
	</div>
</div>

<!-- ================= BOTON INICIAR ================= -->
<div id="start-button-container">
    <button id="start-button" class="disable-clicks">COMENZAR EL JUEGO</button>
</div>



<!-- ================= CONTENIDO DEL JUEGO ================= -->
<div class="container" style="display:none;">
    <table>
        <tr class="fila-titulo">
 		   <th colspan="2" class="title-cell" style="text-align: center;">
    		    <span class="titulo-principal">SOPA DE LETRAS</span><br>
      		  <span class="titulo-secundario">Características del Sonido</span>
  		  </th>
        </tr>

        <tr>
        <td id="align-center-center">
            <!-- CUADRILLA -->
            <div id="puzzle"></div>
            <!-- PALABRA -->
            <div class="titulo-referencias">
                PALABRA A ENCONTRAR
                <div id="lista-palabras">
                    <ul>
                        <li id="palabras"></li>
                    </ul>
                </div>
            </div>
        </td>

            <td id="align-left-top" class="celda-panel" style="position: relative;">
			<div id="panel">
			    <div>

			        <div class="dato">
			            <span class="icono">👤</span>
			            <span id="actualUsername"></span>
			        </div>
  			        <div class="dato">
			            <span class="icono">⏱</span>
 			            <span class="texto">Tiempo:</span>
			            <span id="reloj">02:00</span>
  			        </div>
			        <div class="dato">
			            <span class="icono">⭐</span>
			            <span class="texto">Puntaje:</span>
			            <span id="puntaje">0</span>
    			        </div>
                            </div>

                <button id="lectorButton">Cancelar Lectura</button>
            </td>
        </tr>

		<tr class="fila-panel-vertical">
		    <th colspan="2" class="celda-panel-vertical" style="position: relative;">
			<div id="panel-vertical">

 			   <div class="dato">
 			       <span class="icono">👤</span>
  			      <span id="actualUsername-vertical"></span>
			    </div>

			    <div class="dato">
			        <span class="icono">⭐</span>
			        <span class="texto">Puntaje:</span>
   			     <span id="puntaje-vertical">0</span>
			    </div>

			    <div class="dato">
			        <span class="icono">⏱</span>
			        <span class="texto">Tiempo:</span>
			        <span id="reloj-vertical">02:00</span>
			    </div>
				
			</div>
            </th>
        </tr>

    </table>
</div>

<audio id="background-music" loop>
    <source src="sound/Carefree.mp3" type="audio/mpeg">
    Tu navegador no soporta la reproducción de audio.
</audio>

<div id="message" style="display:none;"></div>

<!-- Scripts -->
<script src="lector.js"></script>
<script src="introGame.js"></script>
<script src="verificacionesjuegos.js"></script>
<script src="script.js"></script>

<script>
window.addEventListener("load", () => {
    const actualUsername = localStorage.getItem("ActualUs");
    if (actualUsername) {
        document.getElementById("actualUsername").textContent = actualUsername;
		document.getElementById("actualUsername-vertical").textContent = actualUsername;
    }
});
	
// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>

<!-- ================= BOTONERA MÓVIL ================= -->

  <button id="mobile-main-btn"
          class="fab-main"

    </button>

    <button id="mobile-panel-btn">
      <span aria-hidden="true">📊</span>
    </button>

  </div>
</div>
