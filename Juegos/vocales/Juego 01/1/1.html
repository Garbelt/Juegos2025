    <style>
        #puzzle {
            display: flex;
            flex-wrap: wrap;
            width: 408px; /* Ajustar según el tamañodela imagen*/
            height: 408px; /* Ajustar según el tamañodela imagen*/
            margin: 0 auto;
        }

        .piece {
            width: 102px; /* Ajustar según el tamañodela imageny el número de piezas */
            height: 102px; /* Ajustar según el tamañodela imageny el número de piezas */
            background-size: 408px 408px; /* Ajustarsegún el tamaño de la imagen */
            cursor: pointer;
            box-sizing: border-box;
            border: 1px solid #333;
        }

        .piece.selected {
            box-shadow: 0 0 10px 5px rgba(0, 0, 255, 0.5);
            transform: scale(1.1);
            z-index: 1;
        }

        .empty {
            background: none;
            border: none;
        }

        #lista-palabras {
            margin-top: 10px;
        }

        #lista-palabras ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #lista-palabras ul li {
            margin-bottom: 5px;
        }
