
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompecabezas</title>
    <link rel="stylesheet" href="mensajes.css">
    <link rel="stylesheet" href="botoneria.css">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="adaptadores.css">
    <link rel="stylesheet" href="pre-game.css">
    <style>
        #puzzle {
            display: flex;
            flex-wrap: wrap;
            width: 408px; /* Ajustar según el tamañodela imagen*/
            height: 408px; /* Ajustar según el tamañodela imagen*/
            margin: 0 auto;
        }

        .piece {
            width: 102px; /* Ajustar según el tamañodela imageny el número de piezas */
            height: 102px; /* Ajustar según el tamañodela imageny el número de piezas */
            background-size: 408px 408px; /* Ajustarsegún el tamaño de la imagen */
            cursor: pointer;
            box-sizing: border-box;
            border: 1px solid #333;
        }

        .piece.selected {
            box-shadow: 0 0 10px 5px rgba(0, 0, 255, 0.5);
            transform: scale(1.1);
            z-index: 1;
        }

        .empty {
            background: none;
            border: none;
        }

/* =========================================
   MODAL
   ========================================= */

.modal {
    display: none;
}

.modal-content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #8ec6e6;
    color: black;
    padding: 20px;
    border: 2px solid #333;
    border-radius: 10px;
    font-size: 24px;
    z-index: 9999;
    text-align: center;
    width: 80%;
    max-width: 300px;
}

/* =========================================
   MÓVIL VERTICAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:portrait){
    #puzzle{
        width: 370px;
        height: 370px;
    }

/* 🔹 panel full + título visible (base estable) */
body.panel-full:not(.header-hidden) #puzzle{
        max-height:80vh;
        max-height:80dvh;
        width:auto;
        max-width:100%;
}

/* 🔹 panel full + título oculto */
body.panel-full.header-hidden #puzzle{
	    max-width:87vw;
}

/* 🔹 panel mini */
body.panel-mini:not(.header-hidden) #puzzle{
	    max-width:88vw;
}

body.panel-mini.header-hidden #puzzle{
	    max-width:90vw;
}

/* 🔹 panel oculto */
body.panel-hidden:not(.header-hidden) #puzzle{
	    max-width:92vw;
}

body.panel-hidden.header-hidden #puzzle{
        max-width:95vw;
}
}


/* =========================================
   MÓVIL HORIZONTAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:portrait){
    #puzzle{
        width: 215px;
        height: 215px;
    }

/* 🔒 REGLA PRINCIPAL: título visible = tamaño inicial */
body:not(.header-hidden) #puzzle{
        max-height:60vh;
        max-height:60dvh;
        width:auto;
        max-width:100%;
}

/* 🔹 título oculto + panel full */
body.panel-full.header-hidden #puzzle{
        max-height:75vh;
        max-height:75dvh;
}

/* 🔹 título oculto + panel mini */
body.panel-mini.header-hidden #puzzle{
        max-height:78vh;
        max-height:78dvh;
}

/* 🔹 título oculto + panel oculto */
body.panel-hidden.header-hidden #puzzle{
        max-height:85vh;
        max-height:85dvh;
        max-width:95vw;
}
}
</style>
</head>
<body>

</div>

</td>

</table>

</div>

<script>
// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
