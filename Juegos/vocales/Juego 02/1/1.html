<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sopa de Letras - Vocales</title>
  <link rel="stylesheet" href="mensajes.css">
  <link rel="stylesheet" href="botoneria.css">
  <link rel="stylesheet" href="estilos.css">
  <link rel="stylesheet" href="adaptadores.css">
  <link rel="stylesheet" href="pre-game.css">
  <style>
/* =========================================
   MODAL
   ========================================= */
.modal{
display:none;
}

.modal-content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background-color:#8ec6e6;
color:black;
padding:20px;
border:2px solid #333;
border-radius:10px;
font-size:24px;
z-index:9999;
text-align:center;
width:80%;
max-width:300px;
}

  .btn-corregir { 
    width: 80%;
    display: block;   /* importante */
    margin-left: auto;
    margin-right: auto;
  }

#level-image {
  margin: 10px auto;      /* Centra horizontalmente */
  width: 150px;            /* Ancho fijo */
  height: 150px;           /* Alto fijo */
  object-fit: contain;    /* Mantiene proporción */
  display: block;         /* Necesario para que margin auto funcione */
}

/* =========================================
   GRILLA BASE
   ========================================= */
  .cell{
  width:clamp(22px,6vw,30px);
  height:clamp(22px,6vw,30px);
  border:1px solid #ccc;
  display:inline-block;
  text-align:center;
  line-height:clamp(22px,6vw,30px);
  font-size:clamp(12px,3vw,16px);
  box-sizing:border-box;
  }

  #puzzle {
    display: inline-block;
  }

  #puzzle .row {
    display: flex;
  }

  #puzzle-container {
    width: 390px; /* 12 cells * 30px + borders */
    height: 390px;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 1px solid #ccc;
    margin: auto;
  }

    .found {
      background-color: yellow;
    }

	  
/* =========================================
   MOVIL HORIZONTAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:landscape){

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* Tamaño base (título visible) */
body:not(.header-hidden) .cell{
width:clamp(19px,5.2vh,30px);
height:clamp(19px,5.2vh,30px);
line-height:clamp(19px,5.2vh,30px);
font-size:clamp(11px,2.6vh,16px);
}

/* Panel full + título oculto */
body.panel-full.header-hidden .cell{
width:clamp(19px,5.6vh,32px);
height:clamp(19px,5.6vh,32px);
line-height:clamp(19px,5.6vh,32px);
font-size:clamp(11px,2.8vh,17px);
}

/* Panel mini + título oculto */
body.panel-mini.header-hidden .cell{
width:clamp(19px,6.0vh,34px);
height:clamp(19px,6.0vh,34px);
line-height:clamp(19px,6.0vh,34px);
font-size:clamp(12px,3.0vh,18px);
}

/* Panel oculto + título oculto */
body.panel-hidden.header-hidden .cell{
width:clamp(20px,6.5vh,36px);
height:clamp(20px,6.5vh,36px);
line-height:clamp(20px,6.5vh,36px);
font-size:clamp(12px,3.2vh,19px);
}

/* Centrado del puzzle */
#contenedor-juego{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

#puzzle{
display:flex;
flex-direction:column;
align-items:center;
}

}


/* =========================================
   MOVIL VERTICAL
   ========================================= */
@media screen and (max-width:1023px) and (orientation:portrait){

/* Panel full + título visible */
body.panel-full:not(.header-hidden) .cell{
width:clamp(20px,6vw,32px);
height:clamp(20px,6vw,32px);
line-height:clamp(20px,6vw,32px);
font-size:clamp(12px,3vw,17px);
}

/* Panel full + título oculto */
body.panel-full.header-hidden .cell{
width:clamp(20px,6.5vw,34px);
height:clamp(20px,6.5vw,34px);
line-height:clamp(20px,6.5vw,34px);
font-size:clamp(12px,3.2vw,18px);
}

/* Panel mini */
body.panel-mini .cell{
width:clamp(20px,7vw,36px);
height:clamp(20px,7vw,36px);
line-height:clamp(20px,7vw,36px);
font-size:clamp(12px,3.4vw,19px);
}

/* Panel oculto */
body.panel-hidden .cell{
width:clamp(20px,7.5vw,38px);
height:clamp(20px,7.5vw,38px);
line-height:clamp(20px,7.5vw,38px);
font-size:clamp(13px,3.6vw,20px);
}

/* Centrado del puzzle */
#contenedor-juego{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

#puzzle{
display:flex;
flex-direction:column;
align-items:center;
}

}


  </style>
</head>
<body>

<!-- ================= PANTALLA PREVIA ================= -->

    <div id="pre-game-container">

        <p id="game-description" class="pre-game-description">

 	   <div class="modal-content">

<!-- ================= CONTENIDO DEL JUEGO ================= -->
<div class="container" style="display:none;">
    <table>
        <tr class="fila-titulo">
 		   <th colspan="2" class="title-cell" style="text-align: center;">
    		    <span class="titulo-principal">SOPA DE LETRAS</span><br>
      		  <span class="titulo-secundario">Debes encontrar las 5 vocales</span>
  		  </th>
        </tr>

        <tr>
<td id="align-center-center">
<div id="contenedor-juego">
  <div id="puzzle-container">
    <div id="puzzle"></div>
  </div>
</div>
</td>

            <td id="align-left-top" class="celda-panel" style="position: relative;">
			<div id="panel">
			    <div>
			        <div class="dato">
			            <span class="icono">👤</span>
			            <span id="actualUsername"></span>
			        </div>
  			        <div class="dato">
			            <span class="icono">⏱</span>
 			            <span class="texto">Tiempo:</span>
			            <span id="reloj">02:00</span>
  			        </div>
			        <div class="dato">
			            <span class="icono">⭐</span>
			            <span class="texto">Puntaje:</span>
			            <span id="puntaje">0</span>
    			        </div>
                            </div>
                <button id="corregir-btn" class="btn-corregir">CORREGIR</button>
                <img id="level-image" src="images/nivel1.png" alt="Nivel 1">
                <button id="lectorButton">Cancelar Lectura</button>
            </td>
     </tr>

		<tr class="fila-panel-vertical">
		    <th colspan="2" class="celda-panel-vertical" style="position: relative;">
			<div id="panel-vertical">

 			   <div class="dato">
 			       <span class="icono">👤</span>
  			      <span id="actualUsername-vertical"></span>
			    </div>

			    <div class="dato">
			        <span class="icono">⭐</span>
			        <span class="texto">Puntaje:</span>
   			     <span id="puntaje-vertical">0</span>
			    </div>

			    <div class="dato">
			        <span class="icono">⏱</span>
			        <span class="texto">Tiempo:</span>
			        <span id="reloj-vertical">02:00</span>
			    </div>
				
			</div>
            </th>
        </tr>

    </table>
</div>

    <audio id="background-music" loop>
    <audio id="audio-title" src="sounds/title.mp3"></audio>
    <source src="sounds/Ukelele.mp3" type="audio/mpeg">
    <audio id="audio-correcto" src="sounds/BienChicos.mp3"></audio>
    <audio id="audio-nivel" src="sounds/correcto.mp3"></audio>
    <audio id="audio-nivel-1" src="sounds/nivel1.mp3"></audio>
    <audio id="audio-nivel-2" src="sounds/nivel2.mp3"></audio>
    <audio id="audio-nivel-3" src="sounds/nivel3.mp3"></audio>
    <audio id="audio-nivel-4" src="sounds/nivel4.mp3"></audio>
    <audio id="audio-nivel-5" src="sounds/nivel5.mp3"></audio>
    Tu navegador no soporta la reproducción de audio.
    </audio>

<div id="message" style="display:none;"></div>

<script>
window.addEventListener("load", () => {
    const actualUsername = localStorage.getItem("ActualUs");
    if (actualUsername) {
        document.getElementById("actualUsername").textContent = actualUsername;
		document.getElementById("actualUsername-vertical").textContent = actualUsername;
    }
});
	
// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
