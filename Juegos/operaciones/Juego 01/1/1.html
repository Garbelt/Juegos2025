
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplicaciones con Carreteles</title>
<link rel="stylesheet" href="mensajesdiferente.css">
<link rel="stylesheet" href="botoneria.css">
<link rel="stylesheet" href="estilos.css">
<link rel="stylesheet" href="adaptadores.css">
<link rel="stylesheet" href="pre-game.css">
<style>
#game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 🎰 Carreteles centrados arriba */
#slot-wrapper {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
}

/* Cada ventana del carrete */
.slot-container {
    width: 100px;
    height: 100px;
    overflow: hidden;
    border: 4px solid #333;
    background: white;
}

/* Contenido interno (se animará después) */
.reel {
    display: flex;
    flex-direction: column;
}

/* Números dentro del carrete */
.digit {
    width: 100px;
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 42px;
    font-weight: bold;
    color: #2c7be5; /* azul suave */
}

.signo-multiplicacion {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: bold;
    color: #333;
    height: 100px; /* igual que los carreteles */
}

/* Botón girar */
.zona-girar {
    margin-top: 5px;
}

/* Input separado más abajo */
.zona-input {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}
.zona-input .btn-corregir {
    width: auto;        /* 🔥 clave: anula el 25% */
    margin-top: 0;      /* evita que quede más bajo */
    padding: 10px 16px; /* opcional: mejor proporción */
}

#respuesta::placeholder {
  color: #aaa;   /* gris claro */
  opacity: 1;    /* 🔥 evita que el navegador lo “apague” */
}

#respuesta {
    width: 120px;
    padding: 10px;
    font-size: 22px;
    text-align: center;
}

    .modal { display: none; }
    .modal-content {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #8ec6e6;
        color: black;
        padding: 20px;
        border: 2px solid #333;
        font-size: 24px;
        z-index: 9999;
        text-align: center;
        width: 80%;
        max-width: 300px;
    }


/* =========================================
   🎹 TECLADO VISUAL
   ========================================= */

.keyboard{
  display: grid;
  grid-template-columns: repeat(3, 45px); /* antes 60px */
  gap: 6px; /* opcional, más compacto */
  justify-content: center;
}

/* botones */
.keyboard button{
  width: 45px;
  height: 45px;
  font-size: 15px; /* opcional */
  border-radius: 8px;
  border: 1px solid #444;
  background: #fff;
  cursor: pointer;
  transition: transform 0.1s ease, background-color 0.2s ease;
}

.key-borrar{
  grid-column: span 2;
}

#keyboard-cell{
  border: none !important;
}

.keyboard button:hover{
  background-color: #e0e0e0;
}

.keyboard button:active{
  transform: scale(0.95);
}

/* 🔢 el 0 centrado abajo */
.keyboard .zero{
  grid-column: 2;
}


/* =========================================
   🎹 TECLADO - ESTADO BASE
   (NO se ve en escritorio)
   ========================================= */

#keyboard-cell{
  display: none;
}

.fila-teclado-vertical{
  display: none;
}


/* =========================================
   📱 MÓVIL HORIZONTAL
   teclado a la derecha
   ========================================= */

@media screen and (max-width:1023px) and (orientation: landscape){

  #keyboard-cell{
    display: table-cell;
    width: 220px;
    text-align: center;
    vertical-align: middle;
  }

  /* columna 1 (juego) */
  .container table tr:nth-child(2) td:nth-child(1){
    border-right: none;
  }

  /* columna 2 (teclado) */
  .container table tr:nth-child(2) td:nth-child(2){
    border-left: none;
  }

}


/* =========================================
   📱 MÓVIL VERTICAL
   teclado debajo
   ========================================= */

@media screen and (max-width:1023px) and (orientation: portrait){

  /* teclado lateral NO existe */
  #keyboard-cell{
    display: none;
  }

  /* teclado abajo */
  .fila-teclado-vertical{
    display: table-row;
  }

  #keyboard-vertical{
    text-align: center;
    padding: 10px 0;
  }

	  /* fila 2, columna 1 */
  .container table tr:nth-child(2) td:nth-child(1){
    border-bottom: none;
  }

  /* fila 3, columna 1 */
  .container table tr:nth-child(3) td:nth-child(1){
    border-top: none;
  }

}

</style>
</head>

<script>
window.addEventListener("load", () => {
    // Mostrar usuario si existe en localStorage
    const actualUsername = localStorage.getItem("ActualUs");
    if (actualUsername) {
        document.getElementById("actualUsername").textContent = actualUsername;
    }
});

// ===== PANTALLA PREVIA =====
document.getElementById("read-screen").addEventListener("click", () => {
    leerElemento("game-title");
    leerElemento("game-description");
});

document.getElementById("ver-video-btn").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    if(video.src){
        videoModal.style.display = "block";
        video.play();
    }
});

document.getElementById("close-video").addEventListener("click", () => {
    const videoModal = document.getElementById("video-modal");
    const video = document.getElementById("pre-game-video");
    video.pause();
    video.currentTime = 0;
    videoModal.style.display = "none";
});

document.getElementById("continuar-btn").addEventListener("click", () => {
    document.getElementById("pre-game-screen").style.display = "none";
    document.querySelector(".container").style.display = "block";
    document.getElementById("background-music").play();
    startGame();
});
</script>
